name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Build DMG
        run: ./script/create_dmg.sh

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: BondedBrightness.dmg
          generate_release_notes: true
